name: Deploy Dev

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read
  id-token: write

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm 11
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  terraform-validate:
    name: terraform-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: "~1.14"

      - name: Terraform Init
        working-directory: infra
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

  build-and-push-api:
    name: build-and-push-api
    runs-on: ubuntu-latest
    needs: [build-and-test, terraform-validate]
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag_sha: ${{ steps.meta.outputs.tag_sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Mask sensitive values
        run: echo "::add-mask::${{ secrets.GCP_PROJECT_ID }}"

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set image metadata
        id: meta
        run: |
          SHA="${{ github.sha }}"
          echo "image=${{ secrets.ARTIFACT_REGISTRY_URL }}/slurp-api" >> "$GITHUB_OUTPUT"
          echo "tag_sha=git-${SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          TAG="${{ steps.meta.outputs.tag_sha }}"
          docker build -f apps/api/Dockerfile -t "${IMAGE}:${TAG}" -t "${IMAGE}:dev-latest" .

      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag_sha }}"
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Push
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          TAG="${{ steps.meta.outputs.tag_sha }}"
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:dev-latest"

  build-and-push-web:
    name: build-and-push-web
    runs-on: ubuntu-latest
    needs: [build-and-test, terraform-validate]
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag_sha: ${{ steps.meta.outputs.tag_sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Mask sensitive values
        run: echo "::add-mask::${{ secrets.GCP_PROJECT_ID }}"

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set image metadata
        id: meta
        run: |
          SHA="${{ github.sha }}"
          echo "image=${{ secrets.ARTIFACT_REGISTRY_URL }}/slurp-web" >> "$GITHUB_OUTPUT"
          echo "tag_sha=git-${SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          TAG="${{ steps.meta.outputs.tag_sha }}"
          docker build -f apps/web/Dockerfile -t "${IMAGE}:${TAG}" -t "${IMAGE}:dev-latest" .

      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag_sha }}"
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Push
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          TAG="${{ steps.meta.outputs.tag_sha }}"
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:dev-latest"

  deploy-api-dev:
    name: deploy-api-dev
    runs-on: ubuntu-latest
    needs: [build-and-push-api]
    steps:
      - name: Mask sensitive values
        run: echo "::add-mask::${{ secrets.GCP_PROJECT_ID }}"

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Deploy to Cloud Run (dev)
        run: |
          SHA="${{ github.sha }}"
          IMAGE="${{ secrets.ARTIFACT_REGISTRY_URL }}/slurp-api:git-${SHA::7}"
          gcloud run deploy slurp-api-dev \
            --image="${IMAGE}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --quiet

  deploy-web-dev:
    name: deploy-web-dev
    runs-on: ubuntu-latest
    needs: [build-and-push-web]
    steps:
      - name: Mask sensitive values
        run: echo "::add-mask::${{ secrets.GCP_PROJECT_ID }}"

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Deploy to Cloud Run (dev)
        run: |
          SHA="${{ github.sha }}"
          IMAGE="${{ secrets.ARTIFACT_REGISTRY_URL }}/slurp-web:git-${SHA::7}"
          gcloud run deploy slurp-web-dev \
            --image="${IMAGE}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --quiet

  build-and-push-receipt-processor:
    name: build-and-push-receipt-processor
    runs-on: ubuntu-latest
    needs: [build-and-test, terraform-validate]
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag_sha: ${{ steps.meta.outputs.tag_sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Mask sensitive values
        run: echo "::add-mask::${{ secrets.GCP_PROJECT_ID }}"

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set image metadata
        id: meta
        run: |
          SHA="${{ github.sha }}"
          echo "image=${{ secrets.ARTIFACT_REGISTRY_URL }}/slurp-receipt-processor" >> "$GITHUB_OUTPUT"
          echo "tag_sha=git-${SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          TAG="${{ steps.meta.outputs.tag_sha }}"
          docker build -f apps/receipt-processor/Dockerfile -t "${IMAGE}:${TAG}" -t "${IMAGE}:dev-latest" .

      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag_sha }}"
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Push
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          TAG="${{ steps.meta.outputs.tag_sha }}"
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:dev-latest"

  deploy-receipt-processor-dev:
    name: deploy-receipt-processor-dev
    runs-on: ubuntu-latest
    needs: [build-and-push-receipt-processor]
    steps:
      - name: Mask sensitive values
        run: echo "::add-mask::${{ secrets.GCP_PROJECT_ID }}"

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Deploy to Cloud Run (dev)
        run: |
          SHA="${{ github.sha }}"
          IMAGE="${{ secrets.ARTIFACT_REGISTRY_URL }}/slurp-receipt-processor:git-${SHA::7}"
          gcloud run deploy slurp-receipt-processor-dev \
            --image="${IMAGE}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --quiet

  deploy-firebase-hosting-dev:
    name: deploy-firebase-hosting-dev
    runs-on: ubuntu-latest
    needs: deploy-web-dev
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Mask sensitive values
        run: echo "::add-mask::${{ secrets.GCP_PROJECT_ID }}"

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Deploy Firebase Hosting (dev)
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting:slurp-dev --project "${{ secrets.GCP_PROJECT_ID }}"
