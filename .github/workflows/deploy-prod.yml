name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "API image tag to deploy (e.g. git-abc1234). Defaults to dev-latest."
        required: false
        default: "dev-latest"
      image_tag_web:
        description: "Web image tag to deploy (e.g. git-abc1234). Defaults to dev-latest."
        required: false
        default: "dev-latest"
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm 11
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  terraform-validate:
    name: terraform-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: "~1.14"

      - name: Terraform Init
        working-directory: infra
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

  deploy-api-prod:
    name: deploy-api-prod
    runs-on: ubuntu-latest
    needs: [build-and-test, terraform-validate]
    environment: production
    steps:
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          export_environment_variables: false

      - name: Resolve image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=git-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloud Run (prod)
        run: |
          IMAGE="${{ secrets.ARTIFACT_REGISTRY_URL }}/slurp-api:${{ steps.tag.outputs.value }}"
          gcloud run deploy slurp-api-prod \
            --image="${IMAGE}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --quiet

  deploy-web-prod:
    name: deploy-web-prod
    runs-on: ubuntu-latest
    needs: [build-and-test, terraform-validate]
    environment: production
    steps:
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          export_environment_variables: false

      - name: Resolve image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=git-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.image_tag_web }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloud Run (prod)
        run: |
          IMAGE="${{ secrets.ARTIFACT_REGISTRY_URL }}/slurp-web:${{ steps.tag.outputs.value }}"
          gcloud run deploy slurp-web-prod \
            --image="${IMAGE}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --quiet

  tag-api-prod-latest:
    name: tag-api-prod-latest
    runs-on: ubuntu-latest
    needs: [deploy-api-prod]
    steps:
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          export_environment_variables: false

      - name: Resolve image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=git-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Retag as prod-latest
        run: |
          SOURCE="${{ secrets.ARTIFACT_REGISTRY_URL }}/slurp-api:${{ steps.tag.outputs.value }}"
          gcloud artifacts docker tags add "${SOURCE}" \
            "${{ secrets.ARTIFACT_REGISTRY_URL }}/slurp-api:prod-latest" \
            --project="${{ secrets.GCP_PROJECT_ID }}"

  tag-web-prod-latest:
    name: tag-web-prod-latest
    runs-on: ubuntu-latest
    needs: [deploy-web-prod]
    steps:
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          export_environment_variables: false

      - name: Resolve image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=git-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.image_tag_web }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Retag as prod-latest
        run: |
          SOURCE="${{ secrets.ARTIFACT_REGISTRY_URL }}/slurp-web:${{ steps.tag.outputs.value }}"
          gcloud artifacts docker tags add "${SOURCE}" \
            "${{ secrets.ARTIFACT_REGISTRY_URL }}/slurp-web:prod-latest" \
            --project="${{ secrets.GCP_PROJECT_ID }}"

  deploy-receipt-processor-prod:
    name: deploy-receipt-processor-prod
    runs-on: ubuntu-latest
    needs: [build-and-test, terraform-validate]
    environment: production
    steps:
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          export_environment_variables: false

      - name: Resolve image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=git-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloud Run (prod)
        run: |
          IMAGE="${{ secrets.ARTIFACT_REGISTRY_URL }}/slurp-receipt-processor:${{ steps.tag.outputs.value }}"
          gcloud run deploy slurp-receipt-processor-prod \
            --image="${IMAGE}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --quiet

  tag-receipt-processor-prod-latest:
    name: tag-receipt-processor-prod-latest
    runs-on: ubuntu-latest
    needs: [deploy-receipt-processor-prod]
    steps:
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          export_environment_variables: false

      - name: Resolve image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=git-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Retag as prod-latest
        run: |
          SOURCE="${{ secrets.ARTIFACT_REGISTRY_URL }}/slurp-receipt-processor:${{ steps.tag.outputs.value }}"
          gcloud artifacts docker tags add "${SOURCE}" \
            "${{ secrets.ARTIFACT_REGISTRY_URL }}/slurp-receipt-processor:prod-latest" \
            --project="${{ secrets.GCP_PROJECT_ID }}"

  deploy-firebase-hosting-prod:
    name: deploy-firebase-hosting-prod
    runs-on: ubuntu-latest
    needs: deploy-web-prod
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          export_environment_variables: false

      - name: Deploy Firebase Hosting
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting:slurp-prod --project "${{ secrets.GCP_PROJECT_ID }}"
