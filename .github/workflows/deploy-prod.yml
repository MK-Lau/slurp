name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      _register:
        description: "ignore"
        required: false
      image_tag:
        description: "API image tag to deploy (e.g. git-abc1234). Defaults to dev-latest."
        required: false
        default: "dev-latest"
      image_tag_web:
        description: "Web image tag to deploy (e.g. git-abc1234). Defaults to dev-latest."
        required: false
        default: "dev-latest"
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm 11
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  terraform-validate:
    name: terraform-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "~1.14"

      - name: Terraform Init
        working-directory: infra
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

  deploy-api-prod:
    name: deploy-api-prod
    runs-on: ubuntu-latest
    needs: [build-and-test, terraform-validate]
    environment: production
    steps:
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Resolve image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=git-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloud Run (prod)
        run: |
          IMAGE="${{ vars.ARTIFACT_REGISTRY_URL }}/slurp-api:${{ steps.tag.outputs.value }}"
          gcloud run deploy slurp-api-prod \
            --image="${IMAGE}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --quiet

  deploy-web-prod:
    name: deploy-web-prod
    runs-on: ubuntu-latest
    needs: [build-and-test, terraform-validate]
    environment: production
    steps:
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Resolve image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=git-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.image_tag_web }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloud Run (prod)
        run: |
          IMAGE="${{ vars.ARTIFACT_REGISTRY_URL }}/slurp-web:${{ steps.tag.outputs.value }}"
          gcloud run deploy slurp-web-prod \
            --image="${IMAGE}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --quiet

  tag-api-prod-latest:
    name: tag-api-prod-latest
    runs-on: ubuntu-latest
    needs: [deploy-api-prod]
    steps:
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Resolve image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=git-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Retag as prod-latest
        run: |
          SOURCE="${{ vars.ARTIFACT_REGISTRY_URL }}/slurp-api:${{ steps.tag.outputs.value }}"
          gcloud artifacts docker tags add "${SOURCE}" \
            "${{ vars.ARTIFACT_REGISTRY_URL }}/slurp-api:prod-latest" \
            --project="${{ vars.GCP_PROJECT_ID }}"

  tag-web-prod-latest:
    name: tag-web-prod-latest
    runs-on: ubuntu-latest
    needs: [deploy-web-prod]
    steps:
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Resolve image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=git-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.image_tag_web }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Retag as prod-latest
        run: |
          SOURCE="${{ vars.ARTIFACT_REGISTRY_URL }}/slurp-web:${{ steps.tag.outputs.value }}"
          gcloud artifacts docker tags add "${SOURCE}" \
            "${{ vars.ARTIFACT_REGISTRY_URL }}/slurp-web:prod-latest" \
            --project="${{ vars.GCP_PROJECT_ID }}"

  deploy-receipt-processor-prod:
    name: deploy-receipt-processor-prod
    runs-on: ubuntu-latest
    needs: [build-and-test, terraform-validate]
    environment: production
    steps:
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Resolve image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=git-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloud Run (prod)
        run: |
          IMAGE="${{ vars.ARTIFACT_REGISTRY_URL }}/slurp-receipt-processor:${{ steps.tag.outputs.value }}"
          gcloud run deploy slurp-receipt-processor-prod \
            --image="${IMAGE}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --quiet

  tag-receipt-processor-prod-latest:
    name: tag-receipt-processor-prod-latest
    runs-on: ubuntu-latest
    needs: [deploy-receipt-processor-prod]
    steps:
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Resolve image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=git-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Retag as prod-latest
        run: |
          SOURCE="${{ vars.ARTIFACT_REGISTRY_URL }}/slurp-receipt-processor:${{ steps.tag.outputs.value }}"
          gcloud artifacts docker tags add "${SOURCE}" \
            "${{ vars.ARTIFACT_REGISTRY_URL }}/slurp-receipt-processor:prod-latest" \
            --project="${{ vars.GCP_PROJECT_ID }}"

  deploy-firebase-hosting-prod:
    name: deploy-firebase-hosting-prod
    runs-on: ubuntu-latest
    needs: deploy-web-prod
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Deploy Firebase Hosting
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project "${{ vars.GCP_PROJECT_ID }}"
